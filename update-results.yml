name: Atualizar placares

on:
  schedule:
    - cron: '0 * * * *'      # de hora em hora (UTC)
  workflow_dispatch:          # botão "Run workflow" pra rodar na hora

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Buscar placares do openfootball
        run: python scripts/fetch_results.py

      - name: Commitar se mudou
        run: |
          if git diff --quiet results.json; then
            echo "Sem mudanças nos placares."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "Atualiza placares ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
